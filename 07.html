<!-- image slider -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            height:300px;
            width:300px;
        }
    </style>
</head>

<body>
    <h2>Image Slider</h2>
    <img id="slider" src="https://picsum.photos/id/1015/400/250" alt="img1">
    <br><br>

    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>

    <script>
        let images = [
            "https://picsum.photos/id/1015/400/250",
            "https://picsum.photos/id/1025/400/250",
            "https://picsum.photos/id/1035/400/250"
        ];
        let i=0;
        document.getElementById("slider").src=images[i];

        setInterval(function(){
            i++;
            if(i==images.length){
                alert("Last Image reached");
                i=0;
            }
            document.getElementById("slider").src=images[i];
        },3000)
        function next(){
            i++;
            if(i>=images.length){
                i=0;
            }
            document.getElementById("slider").src=images[i];
        }
        function prev(){
            i--;
            if(i<0){
                i=images.length-1;
            }
            document.getElementById("slider").src=images[i];
        }
    </script>
</body>
</html>
